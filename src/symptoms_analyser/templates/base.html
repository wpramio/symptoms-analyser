<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Symptoms Analyser{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    {% block extra_head %}{% endblock %}
</head>

<body>
    <!-- SVG Sprite: reusable icon symbols referenced via <use href="#icon-..."> -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;" aria-hidden="true">
        <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </symbol>
    </svg>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">Symptoms Analyser</div>

            <div class="sidebar-nav">
                <a href="/" class="sidebar-btn {% if active_page == 'index' %}active{% endif %}">Início</a>
                <a href="/therapy_sessions"
                    class="sidebar-btn {% if active_page == 'therapy_sessions' %}active{% endif %}">Sessões de
                    terapia</a>
                <a href="/patients"
                    class="sidebar-btn {% if active_page == 'patients' %}active{% endif %}">Pacientes</a>

                <div class="sidebar-nav-section">Administração</div>
                <a href="/admin/transcripts"
                    class="sidebar-btn {% if active_page == 'admin_transcripts' %}active{% endif %}">Transcrições e
                    análises</a>
                <a href="/admin/patients"
                    class="sidebar-btn {% if active_page == 'admin_patients' %}active{% endif %}">Gestão de
                    pacientes</a>
                <a href="/admin/calculator"
                    class="sidebar-btn {% if active_page == 'admin_calculator' %}active{% endif %}">Calculadora de
                    custos</a>
                <a href="/admin/compare_tdpm_analysis"
                    class="sidebar-btn {% if active_page == 'compare' %}active{% endif %}">Comparar análises</a>
            </div>
        </aside>

        <main class="app-main" id="mainContainer">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}

    <div id="toastNotification" class="toast-notification"></div>

    <script>
        window.showToast = function(message, type = 'success') {
            const toast = document.getElementById('toastNotification');
            if (!toast) return;
            
            toast.textContent = message;
            toast.className = 'toast-notification'; // Reset classes
            
            if (type === 'error') {
                toast.classList.add('error');
            }
            
            toast.classList.add('active');
            
            if (toast.timeoutId) {
                clearTimeout(toast.timeoutId);
            }
            
            toast.timeoutId = setTimeout(() => {
                toast.classList.remove('active');
            }, 4000);
        };

        // Render any server-side flashed messages automatically
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              window.showToast({{ message | tojson }}, {{ category | tojson }});
            {% endfor %}
          {% endif %}
        {% endwith %}
    </script>
</body>

</html>
